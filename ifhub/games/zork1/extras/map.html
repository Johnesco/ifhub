<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zork I &mdash; Interactive Map</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;color:#e0e0e0;font-family:'Segoe UI',Arial,sans-serif;overflow:hidden;height:100vh}
#controls{background:#16213e;padding:8px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #333;z-index:10;position:relative;flex-wrap:wrap}
#controls label{font-size:13px;color:#aaa}
#controls select,#controls input,#controls button{background:#0f3460;color:#e0e0e0;border:1px solid #444;padding:4px 8px;border-radius:4px;font-size:13px;cursor:pointer}
#controls button:hover{background:#1a4a7a}
#controls input{width:160px;cursor:text}
.title{font-size:15px;font-weight:600;color:#e0c080;margin-right:16px}
#status{margin-left:auto;font-size:12px;color:#888}
#graph-container{width:100%;height:calc(100vh - 44px);overflow:hidden;cursor:grab;position:relative}
#graph-container.dragging{cursor:grabbing}
#graph-container svg{position:absolute;transform-origin:0 0}
#loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:18px;color:#666}
#legend{position:absolute;bottom:12px;left:12px;background:rgba(22,33,62,0.92);padding:10px 14px;border-radius:6px;font-size:11px;line-height:1.9;border:1px solid #333}
.leg{display:flex;align-items:center;gap:6px}
.sw{display:inline-block;width:14px;height:14px;border-radius:2px;border:1px solid #666}
</style>
</head>
<body>
<div id="controls">
 <span class="title">Zork I Map</span>
 <label for="engine">Engine:</label>
 <select id="engine">
  <option value="neato" selected>neato (compass-accurate)</option>
  <option value="fdp">fdp (force-directed)</option>
  <option value="sfdp">sfdp (scaled force)</option>
  <option value="dot">dot (hierarchical)</option>
 </select>
 <label for="search">Search:</label>
 <input id="search" type="text" placeholder="Room name...">
 <button id="fit-btn">Fit</button>
 <button id="reset-btn">Reset</button>
 <span id="status">Loading engine&hellip;</span>
</div>
<div id="graph-container"><div id="loading">Loading Graphviz engine&hellip;</div></div>
<div id="legend">
 <div class="leg"><span class="sw" style="background:#2a2a3d"></span> Dark room</div>
 <div class="leg"><span class="sw" style="background:#f5f0e1"></span> Light room</div>
 <div class="leg"><span class="sw" style="background:#4caf50;border-color:#4caf50"></span> Start room</div>
 <div class="leg"><span style="color:#888;font-size:13px">&#x25C0;&#x2500;&#x25B6;</span> Bidirectional <span style="color:#aaa;font-size:10px">(N/S/E/W labels)</span></div>
 <div class="leg"><span style="color:#e6a23c;font-size:13px">&#x2500;&#x2500;&#x25B6;</span> Asymmetric <span style="color:#e6a23c;font-size:10px">(return blocked &#x2717;)</span></div>
 <div class="leg"><span style="color:#cc6666;font-size:13px">&#x2500;&#x2500;&#x25B6;</span> One-way <span style="color:#cc6666;font-size:10px">(no return)</span></div>
 <div class="leg"><span style="color:#e6882a;font-size:13px">&#x21BA;</span> Self-loop</div>
 <div class="leg"><span style="color:#888">- - -</span> Conditional</div>
</div>

let scale = 1, tx = 0, ty = 0;
let dragging = false, sx = 0, sy = 0;
let curSvg = null;
const ctr = document.getElementById('graph-container');
const stat = document.getElementById('status');

async function render(engine) {
    stat.textContent = 'Rendering (' + engine + ')...';
    document.getElementById('loading').style.display = 'block';
    try {
        const viz = await Viz.instance();
        const str = viz.renderString(DOT, {engine: engine, format: 'svg'});
        if (curSvg) curSvg.remove();
        const d = new DOMParser().parseFromString(str, 'image/svg+xml');
        const svg = d.documentElement;
        svg.style.position = 'absolute';
        svg.style.transformOrigin = '0 0';
        // force transparent bg so page bg shows through
        svg.removeAttribute('style');
        svg.style.position = 'absolute';
        svg.style.transformOrigin = '0 0';
        const pg = svg.querySelector('polygon');
        if (pg) pg.setAttribute('fill', 'transparent');
        ctr.appendChild(svg);
        curSvg = svg;
        document.getElementById('loading').style.display = 'none';
        fitView();
        const nn = svg.querySelectorAll('.node').length;
        const ne = svg.querySelectorAll('.edge').length;
        stat.textContent = nn + ' rooms, ' + ne + ' connections (' + engine + ')';
    } catch(e) {
        stat.textContent = 'Error: ' + e.message;
        document.getElementById('loading').textContent = 'Error: ' + e.message;
        console.error(e);
    }
}

function upXf() {
    if (curSvg) curSvg.style.transform = 'translate('+tx+'px,'+ty+'px) scale('+scale+')';
}

function fitView() {
    if (!curSvg) return;
    // get SVG dimensions from viewBox or width/height attributes
    let svgW, svgH;
    const vb = curSvg.getAttribute('viewBox');
    if (vb) {
        const p = vb.split(/[\s,]+/).map(Number);
        svgW = p[2]; svgH = p[3];
    } else {
        svgW = parseFloat(curSvg.getAttribute('width')) || 1000;
        svgH = parseFloat(curSvg.getAttribute('height')) || 800;
    }
    // remove fixed width/height so SVG scales via transform
    curSvg.removeAttribute('width');
    curSvg.removeAttribute('height');
    curSvg.setAttribute('width', svgW);
    curSvg.setAttribute('height', svgH);
    const cw = ctr.clientWidth, ch = ctr.clientHeight;
    scale = Math.min(cw / svgW, ch / svgH) * 0.95;
    tx = (cw - svgW * scale) / 2;
    ty = (ch - svgH * scale) / 2;
    upXf();
}

// Pan
ctr.addEventListener('mousedown', e => { dragging=true; sx=e.clientX-tx; sy=e.clientY-ty; ctr.classList.add('dragging'); });
ctr.addEventListener('mousemove', e => { if(!dragging)return; tx=e.clientX-sx; ty=e.clientY-sy; upXf(); });
ctr.addEventListener('mouseup', ()=>{ dragging=false; ctr.classList.remove('dragging'); });
ctr.addEventListener('mouseleave', ()=>{ dragging=false; ctr.classList.remove('dragging'); });

// Zoom toward cursor
ctr.addEventListener('wheel', e => {
    e.preventDefault();
    const r = ctr.getBoundingClientRect();
    const mx = e.clientX - r.left, my = e.clientY - r.top;
    const f = e.deltaY > 0 ? 0.9 : 1.1;
    const ns = scale * f;
    tx = mx - (mx - tx) * (ns / scale);
    ty = my - (my - ty) * (ns / scale);
    scale = ns;
    upXf();
}, {passive:false});

// Controls
document.getElementById('engine').onchange = e => render(e.target.value);
document.getElementById('fit-btn').onclick = fitView;
document.getElementById('reset-btn').onclick = () => { scale=1; tx=0; ty=0; upXf(); };

// Search highlight
document.getElementById('search').oninput = e => {
    const q = e.target.value.toLowerCase();
    if (!curSvg) return;
    curSvg.querySelectorAll('.node').forEach(nd => {
        const t = nd.querySelector('title');
        const nm = (t ? t.textContent : '').toLowerCase();
        // find the shape element (polygon for box nodes in graphviz SVG)
        const sh = nd.querySelector('polygon') || nd.querySelector('ellipse') || nd.querySelector('rect') || nd.querySelector('path');
        if (q && nm.includes(q)) {
            if (sh) { sh.setAttribute('stroke', '#ffeb3b'); sh.setAttribute('stroke-width', '3'); }
        } else {
            if (sh) { sh.removeAttribute('stroke'); sh.removeAttribute('stroke-width'); }
        }
    });
};

render('neato');
</script>
