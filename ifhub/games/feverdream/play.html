<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Fever Dream</title>
<meta name="viewport" content="width=device-width, user-scalable=no">
<link rel="stylesheet" href="../../lib/parchment/parchment.css?v=1772752627">
<link rel="stylesheet" href="../../lib/parchment/main.css?v=1772752627">

<style>
/* ── Houdini @property — register as <color> for smooth transitions ── */
@property --mood-buffer-bg { syntax: '<color>'; inherits: true; initial-value: #0e0e12; }
@property --mood-buffer-fg { syntax: '<color>'; inherits: true; initial-value: #c0beb8; }
@property --mood-grid-bg   { syntax: '<color>'; inherits: true; initial-value: #161420; }
@property --mood-grid-fg   { syntax: '<color>'; inherits: true; initial-value: #808090; }
@property --mood-accent    { syntax: '<color>'; inherits: true; initial-value: #9098b0; }
@property --mood-ui-bg     { syntax: '<color>'; inherits: true; initial-value: #0e0e12; }
@property --mood-border    { syntax: '<color>'; inherits: true; initial-value: #1e1e28; }

:root {
  /* ── Mood palette (updated dynamically by JS on room change) ── */
  --mood-buffer-bg: #0e0e12;
  --mood-buffer-fg: #c0beb8;
  --mood-grid-bg: #161420;
  --mood-grid-fg: #808090;
  --mood-accent: #9098b0;
  --mood-ui-bg: #0e0e12;
  --mood-border: #1e1e28;

  transition:
    --mood-buffer-bg 1.2s ease-in-out,
    --mood-buffer-fg 1.2s ease-in-out,
    --mood-grid-bg 1.2s ease-in-out,
    --mood-grid-fg 1.2s ease-in-out,
    --mood-accent 1.2s ease-in-out,
    --mood-ui-bg 1.2s ease-in-out,
    --mood-border 1.2s ease-in-out;

  /* ── AsyncGlk / GlkOte base theme ── */
  --glkote-buffer-bg: #0e0e12;
  --glkote-buffer-fg: #c0beb8;
  --glkote-buffer-reverse-bg: #c0beb8;
  --glkote-buffer-reverse-fg: #0e0e12;
  --glkote-buffer-size: 16px;
  --glkote-buffer-line-height: 1.6;
  --glkote-grid-bg: #161420;
  --glkote-grid-fg: #808090;
  --glkote-grid-reverse-bg: #808090;
  --glkote-grid-reverse-fg: #161420;
  --glkote-grid-size: 14px;
  --glkote-input-fg: #9098b0;
  --glkote-error-border: #882020;
  --glkote-warning-border: #3333aa;
  --glkote-prop-family: "Iowan Old Style", Palatino, Georgia, "Times New Roman", serif;
  --glkote-mono-family: "SF Mono", "Fira Code", "Cascadia Code", Consolas, "Courier New", monospace;
  --glkote-grid-mono-family: var(--glkote-mono-family);

  --asyncglk-ui-bg: #0e0e12;
  --asyncglk-ui-border: #1e1e28;
  --asyncglk-ui-fg: #c0beb8;
  --asyncglk-ui-selected: #181824;
  --asyncglk-ui-textbox: #0a0a10;
}

html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  background: #080808;
  overflow: hidden;
}

div#gameport {
  position: absolute;
  inset: 0;
  background: var(--mood-ui-bg);
  transition: background-color 1.2s ease-in-out;
}

/* Overlay layers for effects */
#gameport::before,
#gameport::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 10000;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.WindowFrame {
  background: var(--mood-ui-bg) !important;
}

.WindowFrame:has(.GridWindow) {
  background: var(--mood-buffer-fg) !important;
  transition: background-color 1.2s ease-in-out;
}

.GridWindow,
.GridWindow * {
  background-color: var(--mood-buffer-fg) !important;
  color: #0a0a0a !important;
  font-weight: bold;
  transition: background-color 1.2s ease-in-out, color 1.2s ease-in-out;
}

.GridWindow {
  padding: 6px 12px;
}

.BufferWindow {
  background-color: var(--mood-buffer-bg) !important;
  color: var(--mood-buffer-fg) !important;
  transition: background-color 1.2s ease-in-out, color 1.2s ease-in-out;
}

.BufferWindowInner {
  padding: 20px 40px;
  text-rendering: optimizeLegibility;
}

.Input {
  font-weight: bold;
  color: var(--mood-accent);
  caret-color: var(--mood-accent);
  caret-shape: underscore;
  transition: color 1.2s ease-in-out, caret-color 1.2s ease-in-out;
}

/* ── Text fade-in ── */
@keyframes bufferFadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.BufferLine { animation: bufferFadeIn 0.3s ease-out; }

.Style_header {
  color: #c0c8d0;
  text-shadow: 0 0 8px rgba(160,176,192,0.15);
}

.Style_alert {
  color: #b08870;
  text-shadow: 0 0 6px rgba(176,136,112,0.12);
}

.Style_note {
  color: #808898;
}

.BufferWindow {
  scrollbar-width: thin;
  scrollbar-color: #282830 transparent;
}
.BufferWindow::-webkit-scrollbar { width: 6px; }
.BufferWindow::-webkit-scrollbar-track { background: transparent; }
.BufferWindow::-webkit-scrollbar-thumb { background: #282830; border-radius: 3px; }
.BufferWindow::-webkit-scrollbar-thumb:hover { background: #404050; }

#loadingpane {
  position: absolute;
  width: 100%;
  text-align: center;
  top: 35%;
  color: #607080;
  font-size: 1.2em;
  font-family: var(--glkote-mono-family);
}

@keyframes pulse {
  0%, 100% { opacity: 0.4; }
  50% { opacity: 1; }
}

#loadingpane em {
  animation: pulse 1.5s ease-in-out infinite;
}

/* ══════════════════════════════════════════════════════════════
   MEDICAL MONITOR INTRO — cold blue-green clinical display
   ══════════════════════════════════════════════════════════════ */

@keyframes monitorFlicker {
  0%, 100% { opacity: 1; }
  5%       { opacity: 0.92; }
  8%       { opacity: 1; }
  50%      { opacity: 0.96; }
  52%      { opacity: 1; }
  80%      { opacity: 0.94; }
  83%      { opacity: 1; }
}

@keyframes monitorPulse {
  0%, 100% { text-shadow: 0 0 4px rgba(112,176,160,0.4), 0 0 10px rgba(112,176,160,0.15); }
  50%      { text-shadow: 0 0 6px rgba(112,176,160,0.6), 0 0 16px rgba(112,176,160,0.25); }
}

@keyframes scanlineDrift {
  0%   { transform: translateY(-100%); }
  100% { transform: translateY(100vh); }
}

body.monitor-intro .BufferWindow {
  background-color: #060a0a !important;
  color: #70b0a0 !important;
  font-family: var(--glkote-mono-family);
  animation: monitorFlicker 5s steps(1) infinite, monitorPulse 3s ease-in-out infinite;
  transition: none;
}

body.monitor-intro .BufferWindow .Input {
  color: #70b0a0 !important;
  caret-color: #70b0a0 !important;
  text-shadow: 0 0 4px rgba(112,176,160,0.4);
}

body.monitor-intro .GridWindow,
body.monitor-intro .GridWindow * {
  background-color: #70b0a0 !important;
  color: #060a0a !important;
  font-family: var(--glkote-mono-family);
  text-shadow: none;
}

body.monitor-intro .GridWindow {
  box-shadow: 0 0 12px rgba(112,176,160,0.2), 0 0 24px rgba(112,176,160,0.08);
}

/* Thin scanlines over game area */
body.monitor-intro #gameport::before {
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 3px,
    rgba(0,0,0,0.15) 3px,
    rgba(0,0,0,0.15) 4px
  );
  opacity: 1;
}

/* Monitor vignette — darkened edges */
body.monitor-intro #gameport::after {
  box-shadow:
    inset 0 0 80px 20px rgba(0,0,0,0.5),
    inset 0 0 200px 50px rgba(0,0,0,0.25);
  opacity: 1;
}

/* Drifting scan bar */
body.monitor-intro .monitor-scanbar {
  display: block;
}

.monitor-scanbar {
  display: none;
  position: fixed;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(to bottom,
    transparent,
    rgba(112,176,160,0.04) 30%,
    rgba(112,176,160,0.08) 50%,
    rgba(112,176,160,0.04) 70%,
    transparent
  );
  pointer-events: none;
  z-index: 10002;
  animation: scanlineDrift 4s linear infinite;
}

/* Smooth transition OUT of monitor mode */
body.monitor-fade .BufferWindow {
  transition: background-color 2.5s ease, color 2.5s ease, text-shadow 2.5s ease;
}
body.monitor-fade .GridWindow {
  transition: background-color 2.5s ease, color 2.5s ease, text-shadow 2.5s ease;
}
body.monitor-fade #gameport::before,
body.monitor-fade #gameport::after {
  transition: opacity 2.5s ease;
  opacity: 0;
}

/* ══════════════════════════════════════════════════════════════
   EVENT: Glass break — screen shake + shard particles
   ══════════════════════════════════════════════════════════════ */

@keyframes screenShake {
  0%   { transform: translate(0, 0); }
  10%  { transform: translate(-4px, 2px); }
  20%  { transform: translate(5px, -3px); }
  30%  { transform: translate(-3px, 4px); }
  40%  { transform: translate(4px, -2px); }
  50%  { transform: translate(-2px, 3px); }
  60%  { transform: translate(3px, -1px); }
  70%  { transform: translate(-1px, 2px); }
  80%  { transform: translate(2px, -1px); }
  90%  { transform: translate(-1px, 1px); }
  100% { transform: translate(0, 0); }
}

body.glass-shake #gameport {
  animation: screenShake 0.6s ease-out;
}

@keyframes shardFall {
  0%   { opacity: 1; transform: translate(0, 0) rotate(0deg); }
  100% { opacity: 0; transform: translate(var(--sx), var(--sy)) rotate(var(--sr)); }
}

.glass-shard {
  position: fixed;
  width: var(--shard-w, 4px);
  height: var(--shard-h, 8px);
  background: linear-gradient(135deg, rgba(200,220,240,0.8), rgba(140,170,200,0.4));
  clip-path: polygon(20% 0%, 100% 10%, 80% 100%, 0% 90%);
  pointer-events: none;
  z-index: 10003;
  animation: shardFall var(--shard-dur, 1s) ease-out forwards;
}

/* ══════════════════════════════════════════════════════════════
   EVENT: Fungus consumed — hue ripple + amber flash
   ══════════════════════════════════════════════════════════════ */

@keyframes fungusRipple {
  0%   { filter: hue-rotate(0deg) saturate(1); }
  20%  { filter: hue-rotate(30deg) saturate(1.4); }
  40%  { filter: hue-rotate(-20deg) saturate(1.2); }
  60%  { filter: hue-rotate(15deg) saturate(1.1); }
  80%  { filter: hue-rotate(-5deg) saturate(1.05); }
  100% { filter: hue-rotate(0deg) saturate(1); }
}

body.fungus-ripple #gameport {
  animation: fungusRipple 2.5s ease-in-out;
}

@keyframes fungusFlash {
  0%   { opacity: 0; }
  15%  { opacity: 0.3; }
  40%  { opacity: 0.15; }
  100% { opacity: 0; }
}

.fungus-overlay {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, rgba(200,160,60,0.4) 0%, rgba(160,120,40,0.2) 40%, transparent 70%);
  pointer-events: none;
  z-index: 10003;
  animation: fungusFlash 2.5s ease-out forwards;
}

/* ══════════════════════════════════════════════════════════════
   EVENT: Spray exposure — glitch + static
   ══════════════════════════════════════════════════════════════ */

@keyframes sprayGlitch {
  0%   { filter: none; }
  10%  { filter: hue-rotate(90deg) invert(0.1); }
  12%  { filter: none; }
  30%  { filter: hue-rotate(-60deg) invert(0.15); }
  33%  { filter: none; }
  50%  { filter: hue-rotate(120deg) saturate(2); }
  53%  { filter: none; }
  70%  { filter: invert(0.2) hue-rotate(-90deg); }
  73%  { filter: none; }
  85%  { filter: hue-rotate(45deg) invert(0.08); }
  88%  { filter: none; }
  100% { filter: none; }
}

body.spray-glitch #gameport {
  animation: sprayGlitch 1.5s steps(1) forwards;
}

@keyframes staticFlash {
  0%   { opacity: 0; }
  5%   { opacity: 0.3; }
  10%  { opacity: 0; }
  15%  { opacity: 0.2; }
  20%  { opacity: 0; }
  40%  { opacity: 0.15; }
  42%  { opacity: 0; }
  100% { opacity: 0; }
}

.spray-static {
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 2px,
    rgba(255,255,255,0.08) 2px,
    rgba(255,255,255,0.08) 3px
  );
  pointer-events: none;
  z-index: 10003;
  animation: staticFlash 1.5s steps(1) forwards;
}

/* ══════════════════════════════════════════════════════════════
   EVENT: Valve drain — brief shake + blue drain overlay
   ══════════════════════════════════════════════════════════════ */

@keyframes drainShake {
  0%   { transform: translate(0, 0); }
  15%  { transform: translate(-2px, 1px); }
  30%  { transform: translate(3px, -2px); }
  50%  { transform: translate(-2px, 1px); }
  70%  { transform: translate(1px, -1px); }
  100% { transform: translate(0, 0); }
}

body.drain-shake #gameport {
  animation: drainShake 0.5s ease-out;
}

@keyframes drainFade {
  0%   { opacity: 0.25; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(100%); }
}

.drain-overlay {
  position: fixed;
  inset: 0;
  background: linear-gradient(to bottom, transparent 30%, rgba(60,100,140,0.15) 60%, rgba(40,80,120,0.25) 100%);
  pointer-events: none;
  z-index: 10003;
  animation: drainFade 2s ease-in forwards;
}

/* ══════════════════════════════════════════════════════════════
   EVENT: Valve flood — rising water overlay
   ══════════════════════════════════════════════════════════════ */

@keyframes floodRise {
  0%   { transform: translateY(100%); opacity: 0.3; }
  60%  { transform: translateY(20%); opacity: 0.4; }
  100% { transform: translateY(0%); opacity: 0.5; }
}

.flood-overlay {
  position: fixed;
  inset: 0;
  background: linear-gradient(to top, rgba(20,40,60,0.5) 0%, rgba(30,50,70,0.3) 40%, rgba(20,40,60,0.15) 70%, transparent 100%);
  pointer-events: none;
  z-index: 10003;
  animation: floodRise 3s ease-in forwards;
}

/* ══════════════════════════════════════════════════════════════
   EVENT: Basin touch — radial amber/white flash
   ══════════════════════════════════════════════════════════════ */

@keyframes basinFlash {
  0%   { opacity: 0; transform: scale(0.3); }
  20%  { opacity: 0.6; transform: scale(0.8); }
  50%  { opacity: 0.8; transform: scale(1.2); }
  100% { opacity: 0; transform: scale(2); }
}

.basin-overlay {
  position: fixed;
  inset: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(ellipse at center, rgba(255,255,240,0.6) 0%, rgba(224,176,64,0.3) 30%, rgba(192,152,64,0.1) 50%, transparent 70%);
  pointer-events: none;
  z-index: 10003;
  animation: basinFlash 3s ease-out forwards;
}

/* ══════════════════════════════════════════════════════════════
   EVENT: Wound opening — red-amber vignette pulse
   ══════════════════════════════════════════════════════════════ */

@keyframes woundPulse {
  0%   { opacity: 0; }
  30%  { opacity: 0.5; }
  60%  { opacity: 0.3; }
  100% { opacity: 0; }
}

.wound-overlay {
  position: fixed;
  inset: 0;
  box-shadow:
    inset 0 0 80px 20px rgba(160,60,30,0.4),
    inset 0 0 160px 40px rgba(140,50,20,0.2);
  pointer-events: none;
  z-index: 10003;
  animation: woundPulse 1.5s ease-out forwards;
}

/* ══════════════════════════════════════════════════════════════
   PERSISTENT: Post-fungus — breathing vignette, slower fade-in
   ══════════════════════════════════════════════════════════════ */

@keyframes breathingVignette {
  0%, 100% {
    box-shadow:
      inset 0 0 60px 15px rgba(160,120,40,0.06),
      inset 0 0 120px 30px rgba(140,100,30,0.03);
  }
  50% {
    box-shadow:
      inset 0 0 80px 25px rgba(180,140,50,0.12),
      inset 0 0 150px 40px rgba(160,120,40,0.06);
  }
}

body.state-fungus #gameport::after {
  opacity: 1;
  animation: breathingVignette 4s ease-in-out infinite;
}

body.state-fungus .BufferLine {
  animation-duration: 0.6s;
}

/* ══════════════════════════════════════════════════════════════
   PERSISTENT: Post-spray — chromatic aberration + static flicker
   ══════════════════════════════════════════════════════════════ */

@keyframes chromaticFlicker {
  0%, 89%, 100% { text-shadow: none; }
  90% { text-shadow: -1px 0 rgba(255,60,60,0.3), 1px 0 rgba(60,60,255,0.3); }
  93% { text-shadow: 1px 0 rgba(255,60,60,0.2), -1px 0 rgba(60,60,255,0.2); }
  95% { text-shadow: none; }
}

body.state-spray .BufferWindow {
  animation: chromaticFlicker 6s steps(1) infinite;
}

@keyframes staticOverlay {
  0%, 92%, 100% { opacity: 0; }
  93%  { opacity: 0.04; }
  95%  { opacity: 0; }
  96%  { opacity: 0.03; }
  97%  { opacity: 0; }
}

body.state-spray #gameport::before {
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 2px,
    rgba(255,255,255,0.06) 2px,
    rgba(255,255,255,0.06) 3px
  );
  animation: staticOverlay 8s steps(1) infinite;
  opacity: 0;
}
</style>

<div id="gameport">

  };

  // Post-spray overrides: Cistern/Source shift purple-violet
  var PALETTES_SPRAY = {
    cistern:     { bufferBg:'#120a18', bufferFg:'#c0a8d0', gridBg:'#1a1028', gridFg:'#785898', accent:'#a060c8', uiBg:'#120a18', border:'#201438' },
    source:      { bufferBg:'#140a1a', bufferFg:'#d0b0d8', gridBg:'#1e1030', gridFg:'#8860a0', accent:'#c070d8', uiBg:'#140a1a', border:'#281840' }
  };

  // Room → zone mapping
  var ROOM_ZONES = {
    'Receiving Room': 'ward',
    'Corridor':       'ward',
    'Treatment Room': 'treatment',
    'Stairwell':      'basement',
    'Laboratory':     'laboratory',
    'Cold Storage':   'coldstorage',
    'Cistern':        'cistern',
    'The Source':     'source',
    'Source':         'source'
  };

  var currentRoom = null;
  var currentZone = null;
  var fungusConsumed = false;
  var sprayActive = false;

  function applyPalette(zone) {
    // Select palette with state overrides
    var p = null;
    if (sprayActive && PALETTES_SPRAY[zone]) {
      p = PALETTES_SPRAY[zone];
    } else if (fungusConsumed && PALETTES_FUNGUS[zone]) {
      p = PALETTES_FUNGUS[zone];
    }
    if (!p) p = PALETTES[zone] || PALETTES.ward;

    var root = document.documentElement.style;
    root.setProperty('--mood-buffer-bg', p.bufferBg);
    root.setProperty('--mood-buffer-fg', p.bufferFg);
    root.setProperty('--mood-grid-bg', p.gridBg);
    root.setProperty('--mood-grid-fg', p.gridFg);
    root.setProperty('--mood-accent', p.accent);
    root.setProperty('--mood-ui-bg', p.uiBg);
    root.setProperty('--mood-border', p.border);

    // Sync GlkOte variables so inline styles follow the mood palette
    root.setProperty('--glkote-buffer-bg', p.bufferBg);
    root.setProperty('--glkote-buffer-fg', p.bufferFg);
    root.setProperty('--glkote-grid-bg', p.gridBg);
    root.setProperty('--glkote-grid-fg', p.gridFg);
    root.setProperty('--glkote-input-fg', p.accent);
    root.setProperty('--asyncglk-ui-bg', p.uiBg);
    root.setProperty('--asyncglk-ui-border', p.border);

    var gp = document.getElementById('gameport');
    if (gp) gp.style.backgroundColor = p.uiBg;
  }

  function extractRoomName(gridWindow) {
    var firstLine = gridWindow.querySelector('.GridLine');
    if (!firstLine) return null;
    var text = (firstLine.textContent || '').trim();
    text = text.replace(/\s{2,}.*$/, '').trim();
    return text || null;
  }

  function onRoomChange(roomName) {
    if (roomName === currentRoom) return;
    currentRoom = roomName;
    var zone = ROOM_ZONES[roomName] || 'ward';
    if (zone === currentZone && !fungusConsumed && !sprayActive) return;
    currentZone = zone;
    console.log('[mood] ' + roomName + ' \u2192 ' + zone);
    applyPalette(zone);
  }

  function refreshPalette() {
    if (currentZone) applyPalette(currentZone);
  }

  // ── Grid MutationObserver — room detection ──

  function attachGridObserver(grid) {
    var observer = new MutationObserver(function() {
      var name = extractRoomName(grid);
      if (name) onRoomChange(name);
    });
    observer.observe(grid, { childList: true, characterData: true, subtree: true });
    var name = extractRoomName(grid);
    if (name) onRoomChange(name);
  }

  function startGridObserving() {
    var grid = document.querySelector('.GridWindow');
    if (grid) { attachGridObserver(grid); return; }
    var poll = setInterval(function() {
      grid = document.querySelector('.GridWindow');
      if (grid) { clearInterval(poll); attachGridObserver(grid); }
    }, 500);
  }

  // ── Event visual effects ──

  function triggerGlassBreak() {
    console.log('[fx] Glass shatter');
    document.body.classList.add('glass-shake');

    // Spawn 20 glass shard particles
    var cx = window.innerWidth / 2;
    var cy = window.innerHeight * 0.4;
    for (var i = 0; i < 20; i++) {
      var shard = document.createElement('div');
      shard.className = 'glass-shard';
      var angle = (i / 20) * Math.PI * 2 + (Math.random() - 0.5) * 0.6;
      var dist = 50 + Math.random() * 200;
      shard.style.left = cx + 'px';
      shard.style.top = cy + 'px';
      shard.style.setProperty('--sx', (Math.cos(angle) * dist) + 'px');
      shard.style.setProperty('--sy', (Math.sin(angle) * dist + 40) + 'px');
      shard.style.setProperty('--sr', (Math.random() * 360 - 180) + 'deg');
      shard.style.setProperty('--shard-w', (3 + Math.random() * 6) + 'px');
      shard.style.setProperty('--shard-h', (5 + Math.random() * 10) + 'px');
      shard.style.setProperty('--shard-dur', (0.6 + Math.random() * 0.6) + 's');
      document.body.appendChild(shard);
    }

    setTimeout(function() {
      document.body.classList.remove('glass-shake');
      var shards = document.querySelectorAll('.glass-shard');
      for (var i = 0; i < shards.length; i++) shards[i].remove();
    }, 1500);
  }

  function triggerFungusConsumed() {
    console.log('[fx] Fungus consumed — perception shift');
    fungusConsumed = true;
    document.body.classList.add('fungus-ripple');

    var overlay = document.createElement('div');
    overlay.className = 'fungus-overlay';
    document.body.appendChild(overlay);

    setTimeout(function() {
      document.body.classList.remove('fungus-ripple');
      document.body.classList.add('state-fungus');
      overlay.remove();
      refreshPalette();
    }, 2500);
  }

  function triggerSprayExposure() {
    console.log('[fx] Spray exposure — glitch');
    sprayActive = true;
    document.body.classList.add('spray-glitch');

    var staticEl = document.createElement('div');
    staticEl.className = 'spray-static';
    document.body.appendChild(staticEl);

    setTimeout(function() {
      document.body.classList.remove('spray-glitch');
      document.body.classList.add('state-spray');
      staticEl.remove();
      refreshPalette();
    }, 1500);
  }

  function triggerValveDrain() {
    console.log('[fx] Valve drain');
    document.body.classList.add('drain-shake');

    var overlay = document.createElement('div');
    overlay.className = 'drain-overlay';
    document.body.appendChild(overlay);

    setTimeout(function() {
      document.body.classList.remove('drain-shake');
      overlay.remove();
    }, 2500);
  }

  function triggerValveFlood() {
    console.log('[fx] Valve flood — rising water');
    var overlay = document.createElement('div');
    overlay.className = 'flood-overlay';
    document.body.appendChild(overlay);

    setTimeout(function() {
      overlay.remove();
    }, 4000);
  }

  function triggerBasinTouch() {
    console.log('[fx] Basin touch — amber flash');
    var overlay = document.createElement('div');
    overlay.className = 'basin-overlay';
    document.body.appendChild(overlay);

    setTimeout(function() {
      overlay.remove();
    }, 3500);
  }

  function triggerWoundOpening() {
    console.log('[fx] Wound opening — vignette pulse');
    var overlay = document.createElement('div');
    overlay.className = 'wound-overlay';
    document.body.appendChild(overlay);

    setTimeout(function() {
      overlay.remove();
    }, 1800);
  }

  // ── Buffer MutationObserver — event pattern matching ──

  var lastNodeText = '';

  function watchBuffer() {
    function tryAttach() {
      var buf = document.querySelector('.BufferWindow');
      if (!buf) return false;
      new MutationObserver(function(muts) {
        for (var i = 0; i < muts.length; i++) {
          for (var j = 0; j < muts[i].addedNodes.length; j++) {
            var node = muts[i].addedNodes[j];
            if (node.nodeType !== 1) continue;
            var text = (node.textContent || '').trim();

            // Glass break
            if (/glass shatters cleanly/i.test(text)) {
              triggerGlassBreak();
            }
            // Fungus consumed
            if (/It tastes of nothing/i.test(text) && !fungusConsumed) {
              triggerFungusConsumed();
            }
            // Spray exposure
            if (/Something cold and chemical/i.test(text) && !sprayActive) {
              triggerSprayExposure();
            }
            // Valve drain
            if (/Metal screams against metal/i.test(text)) {
              triggerValveDrain();
            }
            // Valve flood
            if (/Water surges in|Water rushes back/i.test(text)) {
              triggerValveFlood();
            }
            // Basin touch
            if (/You reach in\. It reaches back/i.test(text)) {
              triggerBasinTouch();
            }
            // Wound opening (entering cistern from lab first time)
            if (/a wound has opened/i.test(text)) {
              triggerWoundOpening();
            }

            if (text.length > 0) lastNodeText = text.toLowerCase();
          }
        }
      }).observe(buf, { childList: true, subtree: true });
      return true;
    }
    if (!tryAttach()) {
      var poll = setInterval(function() { if (tryAttach()) clearInterval(poll); }, 500);
    }
  }

  // ── Medical monitor intro — active until first user input ──

  function startMonitor() {
    document.body.classList.add('monitor-intro');
  }

  function endMonitor() {
    if (!document.body.classList.contains('monitor-intro')) return;
    document.body.classList.remove('monitor-intro');
    document.body.classList.add('monitor-fade');
    setTimeout(function() {
      document.body.classList.remove('monitor-fade');
    }, 2500);
    console.log('[mood] Monitor intro ended');
  }

  function watchForFirstInput() {
    var settled = false;
    var settleTimer = null;
    function tryAttachInput() {
      var buf = document.querySelector('.BufferWindow');
      if (!buf) return false;
      var inputObserver = new MutationObserver(function(muts) {
        if (settled) {
          endMonitor();
          inputObserver.disconnect();
          return;
        }
        for (var i = 0; i < muts.length; i++) {
          for (var j = 0; j < muts[i].addedNodes.length; j++) {
            var node = muts[i].addedNodes[j];
            if (node.nodeType !== 1) continue;
            var inp = node.querySelector && node.querySelector('.Input');
            if (inp) {
              endMonitor();
              inputObserver.disconnect();
              return;
            }
          }
        }
        clearTimeout(settleTimer);
        settleTimer = setTimeout(function() { settled = true; }, 1000);
      });
      inputObserver.observe(buf, { childList: true, subtree: true });
      return true;
    }
    if (!tryAttachInput()) {
      var poll = setInterval(function() { if (tryAttachInput()) clearInterval(poll); }, 500);
    }
  }

  // ── Init ──

  function init() {
    startMonitor();
    startGridObserving();
    watchBuffer();
    watchForFirstInput();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

</body>
</html>
