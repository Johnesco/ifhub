<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>QBJS Test: Night of the Vampire Bunnies</title>
<style>
@font-face { font-family: dosvga; src: url(engine/qbjs.woff2); }
@font-face { font-family: dosvga8; src: url(engine/dosvga8.woff); }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
    height: 100%;
    background: #0a0a0a;
    color: #d4c5a9;
    font-family: dosvga, monospace;
    overflow: hidden;
}
body {
    display: flex;
    flex-direction: column;
    align-items: center;
}
.header {
    padding: 8px 12px;
    font-size: 0.9em;
    color: #aa9966;
}
#gx-container {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
}
#gx-container canvas {
    display: block;
    image-rendering: pixelated;
}
#status {
    padding: 8px;
    font-size: 0.8em;
    color: #887755;
}
</style>
</head>
<body>

<div class="header">QBJS Test: Night of the Vampire Bunnies (QBasic)</div>
<div id="gx-container"></div>
<div id="status">Loading engine...</div>

<script src="engine/vfs.js"></script>
<script src="engine/gx.js"></script>
<script src="engine/qb.js"></script>
<script src="engine/qb2js.js"></script>
<script>
(async function() {
    var status = document.getElementById("status");

    try {
        // Fetch the .bas source
        status.textContent = "Loading BUNNY.BAS...";
        var resp = await fetch("BUNNY.BAS");
        if (!resp.ok) throw new Error("Failed to load BUNNY.BAS: " + resp.status);
        var src = await resp.text();

        // Compile BASIC -> JavaScript
        status.textContent = "Compiling...";
        var compiler = await _QBCompiler();
        var js = await compiler.compile(src);

        var warnings = compiler.getWarnings();
        if (warnings.length > 0) {
            console.log("Compiler warnings:");
            warnings.forEach(function(w) {
                console.log((w.mtype ? "ERROR" : "WARN") + " line " + w.line + ": " + w.text);
            });
        }

        // Wrap in async function and execute
        var code = "async function __qbjs_run() {\n" + js + "\n}";
        eval(code);

        status.textContent = "Running...";
        QB.start();
        await __qbjs_run();

    } catch(e) {
        status.textContent = "Error: " + e.message;
        console.error(e);
    }
})();
</script>
</body>
</html>
