<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>__TITLE__</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: #000;
  color: #33ff33;
  font-family: monospace;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  padding: 6px 12px;
  flex-shrink: 0;
}

.header h1 {
  font-size: 0.95em;
  color: #33ff33;
  white-space: nowrap;
}

.header .version {
  font-size: 0.75em;
  color: #1a991a;
  font-style: italic;
  white-space: nowrap;
}

.header .back a {
  font-size: 0.75em;
  color: #1a991a;
  text-decoration: none;
  border-bottom: 1px solid #0d4d0d;
}

.header .back a:hover {
  color: #66ff66;
  border-bottom-color: #33ff33;
}

#screen {
  flex: 1;
  width: 100%;
  min-height: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

#screen canvas {
  display: block;
  max-width: 100%;
  max-height: 100%;
  image-rendering: pixelated;
}
</style>
</head>
<body>

<div class="header">
  <h1>__TITLE__</h1>
  <span class="version">__VERSION_LABEL__</span>
  <span class="back"><a href="__BACK_HREF__">&larr; Back</a></span>
</div>

<div id="screen"></div>

<script id="basic-source" type="text/plain">
__BASIC_SOURCE__
</script>

<script src="https://cdn.jsdelivr.net/gh/nickg/jsbasic@master/jsbasic.min.js"></script>
<script>
(function() {
  var source = document.getElementById('basic-source').textContent;
  var screen = document.getElementById('screen');
  if (typeof JsBasic !== 'undefined') {
    JsBasic.run(source, screen);
  }
})();
</script>

</body>
</html>
